<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set New Password - RepairPartsPro</title>
  <style>
    body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:#0b122b; color:#e7efff; display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { width:100%; max-width:420px; padding:24px; border:1px solid rgba(128,160,232,.3); border-radius:12px; background:#121e44; }
    h1 { margin:0 0 8px; }
    p { color:#b2c2ea; margin:0 0 16px; }
    label { display:block; margin:8px 0 6px; color:#b2c2ea; font-size:.9rem; }
    input { width:100%; min-height:40px; border:1px solid rgba(128,160,232,.3); border-radius:8px; padding:8px 10px; background:#182854; color:#e7efff; }
    button { width:100%; margin-top:12px; min-height:40px; border:none; border-radius:8px; font-weight:700; color:#fff; background:linear-gradient(105deg,#2f7df6,#f59e0b); cursor:pointer; }
    .msg { margin-top:12px; font-size:.9rem; color:#93c5fd; }
    a { color:#93c5fd; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Create a new password</h1>
    <p>Choose a new password with at least 8 characters.</p>
    <form id="resetForm">
      <label for="token">Reset token</label>
      <input id="token" type="text" required />
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" required />
      <button type="submit">Update password</button>
    </form>
    <div class="msg" id="msg"></div>
    <p style="margin-top:14px;"><a href="/login.html">Back to sign in</a></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenInput = document.getElementById('token');
    tokenInput.value = params.get('token') || '';

    const form = document.getElementById('resetForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Updating password...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: tokenInput.value.trim(),
            newPassword: document.getElementById('password').value
          })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          msg.innerHTML = 'Password updated. <a href="/login.html">Sign in now</a>.';
        } else {
          msg.textContent = data.error || 'Unable to reset password.';
        }
      } catch {
        msg.textContent = 'Unable to process request right now.';
      }
    });
  </script>
</body>
</html>
