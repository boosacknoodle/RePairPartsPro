<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account Profile — RepairPartsPro</title>
  <style>
    :root {
      --bg: #0b122b;
      --surface: #121e44;
      --text: #e7efff;
      --muted: #b2c2ea;
      --border: rgba(128, 160, 232, 0.3);
      --accent: #2f7df6;
      --danger: #b91c1c;
      --success: #059669;
      --trace: rgba(74, 145, 255, 0.2);
      --node: rgba(251, 191, 36, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 26%, var(--node) 0 2px, transparent 2px),
        radial-gradient(circle at 70% 62%, var(--node) 0 2px, transparent 2px),
        radial-gradient(circle at 84% 18%, var(--node) 0 1.6px, transparent 1.6px),
        radial-gradient(900px 520px at 12% 8%, rgba(47, 125, 246, 0.24), transparent 62%),
        radial-gradient(820px 480px at 92% -4%, rgba(245, 158, 11, 0.2), transparent 58%),
        repeating-linear-gradient(90deg, transparent 0 56px, var(--trace) 56px 58px, transparent 58px 116px),
        repeating-linear-gradient(0deg, transparent 0 60px, var(--trace) 60px 62px, transparent 62px 120px),
        linear-gradient(180deg, #0d1530 0%, var(--bg) 100%);
      color: var(--text);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, transparent 22%, rgba(74, 145, 255, 0.12) 22% 24%, transparent 24% 68%, rgba(74, 145, 255, 0.12) 68% 70%, transparent 70%),
        linear-gradient(45deg, transparent 18%, rgba(245, 158, 11, 0.1) 18% 19.5%, transparent 19.5% 82%, rgba(245, 158, 11, 0.1) 82% 83.5%, transparent 83.5%);
      opacity: 0.34;
      z-index: 0;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 14px 40px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #2f7df6, #f59e0b);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { width: 20px; height: 20px; fill: #fff; }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .btn-back {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }

    .btn-back:hover { border-color: #93c5fd; color: #93c5fd; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--text);
    }

    .info-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child { border-bottom: none; }

    .info-label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
    }

    .info-value {
      font-size: 0.9rem;
      color: var(--text);
    }

    .subscription-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .badge-free {
      background: rgba(75, 85, 99, 0.3);
      border: 1px solid rgba(107, 120, 148, 0.5);
      color: #bec1cc;
    }

    .badge-active {
      background: rgba(5, 150, 105, 0.2);
      border: 1px solid rgba(5, 150, 105, 0.4);
      color: #86efac;
    }

    .form-group {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    input, button {
      font-family: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 38px;
      font-size: 0.9rem;
      color: var(--text);
      background: #182854;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      min-height: 38px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
    }

    .btn-primary {
      background: linear-gradient(105deg, #2f7df6, #f59e0b);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-danger {
      background: linear-gradient(105deg, #b91c1c, #ef4444);
      color: #fff;
    }

    .btn-danger:hover { opacity: 0.9; }

    .tier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .tier-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tier-card:hover {
      border-color: var(--accent);
      background: rgba(47, 125, 246, 0.1);
    }

    .tier-card.selected {
      border-color: var(--success);
      background: rgba(5, 150, 105, 0.15);
    }

    .tier-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tier-price {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .tier-features {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .msg.error {
      background: rgba(185, 28, 28, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .msg.success {
      background: rgba(5, 150, 105, 0.2);
      border: 1px solid rgba(6, 182, 127, 0.3);
      color: #86efac;
    }

    @media (max-width: 760px) {
      .info-row {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .tier-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z" fill="white"/></svg>
        </div>
        <span class="brand-name">My Account</span>
      </div>
      <div style="display:flex;gap:8px;">
        <a href="/analytics.html" class="btn-back">Analytics</a>
        <a href="/" class="btn-back">← Back to Search</a>
      </div>
    </div>

    <!-- Profile Section -->
    <div class="panel">
      <h2>Account Information</h2>
      <div id="profileContent">Loading...</div>
    </div>

    <!-- Subscription Section -->
    <div class="panel">
      <h2>Subscription</h2>
      <div id="subscriptionContent">Loading...</div>
    </div>

    <!-- Change Password Section -->
    <div class="panel">
      <h2>Security</h2>
      <h3>Change Password</h3>
      <div id="passwordMsg"></div>
      <form id="passwordForm" novalidate>
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input id="currentPassword" type="password" name="currentPassword" autocomplete="current-password" required />
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" name="newPassword" autocomplete="new-password" placeholder="At least 8 characters" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input id="confirmPassword" type="password" name="confirmPassword" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn-primary" id="passwordSubmit">Update Password</button>
      </form>
    </div>

    <div class="panel">
      <h2>Danger Zone</h2>
      <p style="margin:0 0 10px;color:#fecaca;">Delete your account permanently. This removes your profile, subscription, analytics, and reset tokens.</p>
      <div id="deleteMsg"></div>
      <div class="form-group">
        <label for="deletePassword">Confirm current password</label>
        <input id="deletePassword" type="password" name="deletePassword" autocomplete="current-password" />
      </div>
      <button type="button" class="btn-danger" id="deleteAccountBtn">Delete Account Permanently</button>
    </div>
  </div>

  <script>
    (function () {
      if (!localStorage.getItem('rpp_token')) {
        window.location.replace('/login.html');
        return;
      }

      const token = localStorage.getItem('rpp_token');
      const profileContent = document.getElementById('profileContent');
      const subscriptionContent = document.getElementById('subscriptionContent');
      const passwordForm = document.getElementById('passwordForm');
      const passwordMsg = document.getElementById('passwordMsg');
      const passwordSubmit = document.getElementById('passwordSubmit');
      const deleteMsg = document.getElementById('deleteMsg');
      const deleteAccountBtn = document.getElementById('deleteAccountBtn');

      async function loadProfile() {
        try {
          const res = await fetch('/api/profile', {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (res.ok) {
            const data = await res.json();
            renderProfile(data);
          } else if (res.status === 401) {
            localStorage.removeItem('rpp_token');
            window.location.replace('/login.html');
          }
        } catch (err) {
          profileContent.innerHTML = '<p class="msg error">Unable to load profile.</p>';
        }
      }

      function renderProfile(data) {
        const joinDate = new Date(data.createdAtUtc).toLocaleDateString();
        profileContent.innerHTML = `
          <div class="info-row">
            <span class="info-label">Email Address</span>
            <span class="info-value">${escapeHtml(data.email)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Member Since</span>
            <span class="info-value">${joinDate}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Subscription</span>
            <span class="info-value">
              <span class="subscription-badge ${data.isSubscriptionActive && data.subscriptionTier !== 'None' ? 'badge-active' : 'badge-free'}">
                ${data.isSubscriptionActive && data.subscriptionTier !== 'None' ? data.subscriptionTier : 'None'}
              </span>
              ${data.subscriptionExpiresAtUtc ? ` – Expires ${new Date(data.subscriptionExpiresAtUtc).toLocaleDateString()}` : ''}
            </span>
          </div>
        `;

        renderSubscriptionPlans(data);
      }

      function renderSubscriptionPlans(profile) {
        const plans = [
          { name: 'Basic', price: 10.99, features: '3 saved searches\nPart alerts\nGenuine-part validation' },
          { name: 'Pro', price: 24.99, features: 'Everything in Basic\n10 saved searches\nPrice drop alerts\nExport CSV' }
        ];

        const hasActivePlan = profile.isSubscriptionActive && profile.subscriptionTier !== 'None';

        subscriptionContent.innerHTML = `
          ${!hasActivePlan ? `
            <div style="padding:14px;border:1px solid rgba(245,158,11,0.4);border-radius:8px;background:rgba(245,158,11,0.08);margin-bottom:14px;color:#fde68a;font-weight:600;">
              You have no active subscription. Choose a plan below to get started.
            </div>
          ` : ''}
          <div class="tier-grid">
            ${plans.map(plan => `
              <div class="tier-card ${profile.subscriptionTier === plan.name && hasActivePlan ? 'selected' : ''}" data-tier="${plan.name}">
                <div class="tier-name">${plan.name}</div>
                <div class="tier-price">$${plan.price.toFixed(2)}/mo</div>
                <div class="tier-features">${plan.features.replace(/\n/g, '<br>')}</div>
                ${!(profile.subscriptionTier === plan.name && hasActivePlan) ? `<button type="button" class="btn-primary" style="width:100%;margin-top:8px;padding:8px;" onclick="upgradeTier('${plan.name}')">${hasActivePlan ? 'Upgrade' : 'Buy'}</button>` : ''}
              </div>
            `).join('')}
          </div>
          ${hasActivePlan ? `
            <div style="margin-top:12px;">
              <button type="button" class="btn-danger" style="min-height:36px;padding:0 12px;" onclick="cancelSubscription()">Cancel Subscription</button>
            </div>
          ` : ''}
        `;
      }

        window.upgradeTier = async function (tier) {
          if (typeof tier !== 'string' || !tier) return;
          try {
            const res = await fetch('/api/stripe/checkout', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ tierName: tier })
            });
            if (res.ok) {
              const data = await res.json();
              window.location.href = data.url;
            } else {
              const err = await res.json().catch(() => ({}));
              alert(err.error || 'Unable to start checkout. Please try again.');
            }
          } catch {
            alert('Unable to connect to checkout. Please try again.');
          }
        };

      window.cancelSubscription = async function () {
        if (!confirm('Cancel your subscription? You will lose access immediately and will need to purchase a plan to restore access.')) {
          return;
        }

        try {
          const res = await fetch('/api/profile/subscription/cancel', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });

          if (res.ok) {
            const data = await res.json();
            renderProfile(data);
            alert('Subscription cancelled. You no longer have an active plan.');
          } else {
            alert('Failed to cancel subscription.');
          }
        } catch {
          alert('Unable to process cancellation.');
        }
      };

      passwordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        passwordMsg.innerHTML = '';

        const current = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (newPass !== confirm) {
          passwordMsg.innerHTML = '<div class="msg error">Passwords do not match.</div>';
          return;
        }

        passwordSubmit.disabled = true;
        passwordSubmit.textContent = 'Updating...';

        try {
          const res = await fetch('/api/profile/password', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ currentPassword: current, newPassword: newPass })
          });

          if (res.ok) {
            passwordMsg.innerHTML = '<div class="msg success">Password updated successfully!</div>';
            passwordForm.reset();
          } else if (res.status === 401) {
            passwordMsg.innerHTML = '<div class="msg error">Current password is incorrect.</div>';
          } else {
            const body = await res.json();
            passwordMsg.innerHTML = `<div class="msg error">${escapeHtml(body.error || 'Failed to update password.')}</div>`;
          }
        } catch {
          passwordMsg.innerHTML = '<div class="msg error">Unable to update password. Please try again.</div>';
        } finally {
          passwordSubmit.disabled = false;
          passwordSubmit.textContent = 'Update Password';
        }
      });

      deleteAccountBtn.addEventListener('click', async () => {
        deleteMsg.innerHTML = '';
        const currentPassword = document.getElementById('deletePassword').value;
        if (!currentPassword) {
          deleteMsg.innerHTML = '<div class="msg error">Enter your current password to continue.</div>';
          return;
        }

        if (!confirm('Delete your account permanently? This cannot be undone.')) {
          return;
        }

        deleteAccountBtn.disabled = true;
        deleteAccountBtn.textContent = 'Deleting...';

        try {
          const res = await fetch('/api/profile/delete', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ currentPassword })
          });

          if (res.ok) {
            localStorage.removeItem('rpp_token');
            localStorage.removeItem('rpp_email');
            localStorage.removeItem('rpp_remember_email');
            alert('Your account has been deleted.');
            window.location.replace('/signup.html');
            return;
          }

          if (res.status === 401) {
            deleteMsg.innerHTML = '<div class="msg error">Current password is incorrect.</div>';
          } else {
            const body = await res.json().catch(() => ({}));
            deleteMsg.innerHTML = `<div class="msg error">${escapeHtml(body.error || 'Unable to delete account.')}</div>`;
          }
        } catch {
          deleteMsg.innerHTML = '<div class="msg error">Unable to delete account right now.</div>';
        } finally {
          deleteAccountBtn.disabled = false;
          deleteAccountBtn.textContent = 'Delete Account Permanently';
        }
      });

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      loadProfile();

        // Show banner when returning from Stripe Checkout
        const params = new URLSearchParams(window.location.search);
        if (params.get('checkout') === 'success') {
          const banner = document.createElement('div');
          banner.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;font-weight:700;padding:12px 24px;border-radius:8px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,0.4);';
          banner.textContent = 'Payment successful! Your subscription is now active.';
          document.body.appendChild(banner);
          setTimeout(() => banner.remove(), 6000);
          history.replaceState(null, '', '/profile.html');
        } else if (params.get('checkout') === 'cancelled') {
          const banner = document.createElement('div');
          banner.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;font-weight:700;padding:12px 24px;border-radius:8px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,0.4);';
          banner.textContent = 'Checkout cancelled. No charge was made.';
          document.body.appendChild(banner);
          setTimeout(() => banner.remove(), 5000);
          history.replaceState(null, '', '/profile.html');
        }
    })();
  </script>
</body>
</html>
